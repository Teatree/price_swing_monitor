<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Price Swing Monitor — Polymarket</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #09090b; --card: #18181b; --border: #27272a; --border-hi: #3f3f46;
    --text: #fafafa; --muted: #a1a1aa; --dim: #71717a;
    --accent: #f97316; --accent-dim: #c2410c;
    --green: #22c55e; --red: #ef4444; --blue: #3b82f6;
    --yellow: #eab308;
  }

  body {
    font-family: 'Space Grotesk', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    line-height: 1.5; padding: 20px; max-width: 1200px; margin: 0 auto;
  }

  .top-bar { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
  .top-bar-left h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 4px; }
  .top-bar-left h1 span { color: var(--accent); }
  .top-bar-left .subtitle { color: var(--muted); font-size: 0.85rem; }

  .sound-toggle {
    display: flex; align-items: center; gap: 8px;
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 14px; cursor: pointer; user-select: none;
    font-size: 0.8rem; color: var(--muted); transition: border-color 0.15s;
  }
  .sound-toggle:hover { border-color: var(--border-hi); }
  .sound-toggle.on { border-color: var(--accent); color: var(--text); }
  .sound-icon { font-size: 1.1rem; }

  /* ── Controls ── */
  .controls {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px; margin-bottom: 24px;
  }
  .controls-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 14px; margin-bottom: 16px;
  }
  .field label {
    display: block; font-size: 0.75rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px;
  }
  .field input[type="number"] {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 10px; color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size: 0.85rem;
  }
  .field input:focus { outline: none; border-color: var(--accent); }

  .sport-checks {
    display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px;
  }
  .sport-check {
    display: flex; align-items: center; gap: 6px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 12px; cursor: pointer; font-size: 0.8rem; user-select: none;
    transition: border-color 0.15s;
  }
  .sport-check:has(input:checked) { border-color: var(--accent); }
  .sport-check input { accent-color: var(--accent); cursor: pointer; }

  .controls-actions {
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  }
  .btn {
    font-family: 'Space Grotesk', sans-serif; font-weight: 600;
    padding: 10px 24px; border: none; border-radius: 8px; cursor: pointer;
    font-size: 0.9rem; transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-start { background: var(--accent); color: #fff; }
  .btn-stop  { background: var(--red); color: #fff; }
  .btn-scan  { background: var(--border-hi); color: var(--text); }

  .status {
    font-size: 0.8rem; color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .status .dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    margin-right: 4px; vertical-align: middle;
  }
  .dot-idle    { background: var(--dim); }
  .dot-live    { background: var(--green); animation: pulse 1.5s ease infinite; }
  .dot-scan    { background: var(--accent); animation: pulse 0.8s ease infinite; }
  .dot-error   { background: var(--red); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* ── Results ── */
  .results-header {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 12px;
  }
  .results-header h2 { font-size: 1.1rem; font-weight: 600; }
  .results-count { color: var(--muted); font-size: 0.8rem; font-family: 'JetBrains Mono', monospace; }

  .no-results {
    text-align: center; color: var(--dim); padding: 40px;
    border: 1px dashed var(--border); border-radius: 12px; font-size: 0.9rem;
  }

  .section-label {
    font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--dim); margin: 20px 0 10px; padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .section-label:first-child { margin-top: 0; }

  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(370px, 1fr)); gap: 14px; }

  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px; transition: border-color 0.2s;
  }
  .card:hover { border-color: var(--border-hi); }
  .card-dimmed { opacity: 0.45; }
  .card-dimmed:hover { opacity: 0.65; border-color: var(--border-hi); }

  .card-top-row {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 4px;
  }
  .card-sport {
    font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--accent); font-weight: 600;
  }
  .card-badge {
    font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.05em;
    padding: 2px 7px; border-radius: 4px; font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
  }
  .badge-swing    { background: rgba(239,68,68,0.2); color: var(--red); }
  .badge-live     { background: rgba(34,197,94,0.2); color: var(--green); }

  .card-title {
    font-weight: 600; font-size: 0.95rem; margin-bottom: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-title a { color: var(--text); text-decoration: none; }
  .card-title a:hover { color: var(--accent); }

  .card-meta {
    font-size: 0.72rem; color: var(--dim); margin-bottom: 10px;
    font-family: 'JetBrains Mono', monospace;
    display: flex; flex-wrap: wrap; gap: 4px 12px;
  }

  .card-reason {
    font-size: 0.7rem; color: var(--dim); font-style: italic;
    margin-bottom: 8px;
  }

  .outcome-row {
    display: grid; grid-template-columns: 1fr auto auto auto auto;
    align-items: center; gap: 6px; padding: 7px 0;
    border-top: 1px solid var(--border); font-size: 0.84rem;
  }
  .outcome-name {
    font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .outcome-fav { color: var(--yellow); }
  .price {
    font-family: 'JetBrains Mono', monospace; font-weight: 600;
    text-align: right; font-size: 0.84rem;
  }
  .price-pre { color: var(--muted); }
  .arrow { color: var(--dim); font-size: 0.7rem; }
  .pct {
    font-family: 'JetBrains Mono', monospace; font-weight: 600;
    font-size: 0.78rem; min-width: 60px; text-align: right;
  }
  .pct-neg { color: var(--red); }
  .pct-pos { color: var(--green); }
  .pct-na  { color: var(--dim); }

  /* ── Log ── */
  .log-section { margin-top: 32px; }
  .log-toggle {
    display: flex; align-items: center; gap: 8px; cursor: pointer;
    font-weight: 600; font-size: 0.95rem; color: var(--muted);
    background: none; border: none; padding: 8px 0;
  }
  .log-toggle:hover { color: var(--text); }
  .log-arrow { transition: transform 0.2s; display: inline-block; }
  .log-arrow.open { transform: rotate(90deg); }

  .log-table-wrap {
    overflow-x: auto; margin-top: 10px;
    border: 1px solid var(--border); border-radius: 8px;
  }
  .log-table {
    width: 100%; border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace; font-size: 0.75rem;
  }
  .log-table th {
    text-align: left; padding: 10px 12px; background: var(--card);
    color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em;
    font-size: 0.7rem; border-bottom: 1px solid var(--border);
  }
  .log-table td {
    padding: 8px 12px; border-bottom: 1px solid var(--border);
  }
  .log-table tr:last-child td { border-bottom: none; }
  .log-table tr:hover td { background: rgba(249, 115, 22, 0.04); }

  .hidden { display: none; }

  .loading-bar {
    height: 3px; background: linear-gradient(90deg, transparent, var(--accent), transparent);
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    animation: loading-slide 1.2s ease-in-out infinite;
  }
  @keyframes loading-slide {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }
</style>
</head>
<body>

<div id="loadingBar" class="loading-bar hidden"></div>

<div class="top-bar">
  <div class="top-bar-left">
    <h1>Price Swing <span>Monitor</span></h1>
    <p class="subtitle">Live Polymarket sports moneyline markets — in-match price swings</p>
  </div>
  <div style="display:flex; gap:8px; align-items:flex-start;">
    <div class="sound-toggle on" id="soundToggle" onclick="toggleSound()">
      <span class="sound-icon" id="soundIcon">&#128264;</span>
      <span id="soundLabel">Sound ON</span>
    </div>
    <div class="sound-toggle" id="tgToggle" onclick="toggleTelegram()">
      <span class="sound-icon">&#9992;</span>
      <span id="tgLabel">TG OFF</span>
    </div>
    <div class="sound-toggle" id="tgTestBtn" onclick="testTelegram()" title="Send test message">
      <span class="sound-icon">&#128172;</span>
      <span>Test TG</span>
    </div>
  </div>
</div>

<!-- ── Controls ── -->
<div class="controls">
  <div class="controls-grid">
    <div class="field">
      <label>Market Cap ($)</label>
      <input type="number" id="minVolume" value="10000" min="0" step="1000">
    </div>
    <div class="field">
      <label>Min Shares</label>
      <input type="number" id="minShares" value="0" min="0" step="50">
    </div>
    <div class="field">
      <label>Update Interval (s)</label>
      <input type="number" id="interval" value="60" min="15" step="5">
    </div>
    <div class="field">
      <label>Pre-Match Fav (&gt;)</label>
      <input type="number" id="startPrice" value="68" min="1" max="99" step="1">
    </div>
    <div class="field">
      <label>Fav Now (&lt;)</label>
      <input type="number" id="curPrice" value="40" min="1" max="99" step="1">
    </div>
  </div>

  <div class="sport-checks">
    <label class="sport-check"><input type="checkbox" value="CS2" checked> CS2</label>
    <label class="sport-check"><input type="checkbox" value="Dota2" checked> Dota 2</label>
    <label class="sport-check"><input type="checkbox" value="Valorant" checked> Valorant</label>
    <label class="sport-check"><input type="checkbox" value="LoL" checked> LoL</label>
    <label class="sport-check"><input type="checkbox" value="Soccer" checked> Soccer</label>
    <label class="sport-check"><input type="checkbox" value="NFL" checked> NFL</label>
    <label class="sport-check"><input type="checkbox" value="NBA" checked> NBA</label>
    <label class="sport-check"><input type="checkbox" value="NHL" checked> NHL</label>
  </div>

  <div class="controls-actions">
    <button class="btn btn-scan" id="btnScan" onclick="doScan()">Scan Now</button>
    <button class="btn btn-start" id="btnMonitor" onclick="toggleMonitor()">Start Monitoring</button>
    <span class="status" id="status"><span class="dot dot-idle"></span> Idle</span>
  </div>
</div>

<!-- ── Results ── -->
<div class="results-header">
  <h2>Live Markets</h2>
  <span class="results-count" id="resultsCount"></span>
</div>
<div id="resultsArea">
  <div class="no-results">No markets scanned yet. Click <b>Scan Now</b> or <b>Start Monitoring</b>.</div>
</div>

<!-- ── Log ── -->
<div class="log-section">
  <button class="log-toggle" onclick="toggleLog()">
    <span class="log-arrow" id="logArrow">&#9654;</span>
    Swing Log (<span id="logCount">0</span> entries)
  </button>
  <div id="logBody" class="hidden">
    <div class="log-table-wrap">
      <table class="log-table">
        <thead><tr>
          <th>Timestamp</th><th>Sport</th><th>Market</th>
          <th>Out 1</th><th>Pre</th><th>Now</th>
          <th>Out 2</th><th>Pre</th><th>Now</th>
          <th>Out 3</th><th>Pre</th><th>Now</th>
        </tr></thead>
        <tbody id="logTableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
let monitoring = false;
let timer = null;
let scanning = false;
let soundEnabled = true;
let telegramEnabled = false;
let knownSwingIds = new Set();  // condition_ids of swing markets we've already seen

function $(id) { return document.getElementById(id); }

// ── Sound ──
function toggleSound() {
  soundEnabled = !soundEnabled;
  const el = $('soundToggle');
  el.classList.toggle('on', soundEnabled);
  $('soundIcon').innerHTML = soundEnabled ? '&#128264;' : '&#128263;';
  $('soundLabel').textContent = soundEnabled ? 'Sound ON' : 'Sound OFF';
}

function playSwingAlert() {
  if (!soundEnabled) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    // Two-tone alert: C5 then E5
    const notes = [523.25, 659.25];
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.3, ctx.currentTime + i * 0.15);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.15 + 0.25);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(ctx.currentTime + i * 0.15);
      osc.stop(ctx.currentTime + i * 0.15 + 0.25);
    });
  } catch (e) { /* ignore audio errors */ }
}

// ── Telegram ──
function toggleTelegram() {
  telegramEnabled = !telegramEnabled;
  const el = $('tgToggle');
  el.classList.toggle('on', telegramEnabled);
  $('tgLabel').textContent = telegramEnabled ? 'TG ON' : 'TG OFF';
}

async function sendTelegram(markets) {
  if (!telegramEnabled || !markets.length) return;
  try {
    const resp = await fetch('/api/telegram-send', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({markets}),
    });
    const data = await resp.json();
    if (!data.ok) console.error('Telegram error:', data);
  } catch (e) {
    console.error('Telegram send failed:', e);
  }
}

async function testTelegram() {
  const btn = $('tgTestBtn');
  btn.style.opacity = '0.4';
  btn.style.pointerEvents = 'none';
  try {
    const resp = await fetch('/api/telegram-test', {method: 'POST'});
    const data = await resp.json();
    if (data.ok) {
      btn.querySelector('span:last-child').textContent = 'Sent!';
    } else {
      btn.querySelector('span:last-child').textContent = 'Failed';
      console.error('TG test error:', data);
    }
  } catch (e) {
    btn.querySelector('span:last-child').textContent = 'Error';
    console.error(e);
  }
  setTimeout(() => {
    btn.querySelector('span:last-child').textContent = 'Test TG';
    btn.style.opacity = '';
    btn.style.pointerEvents = '';
  }, 2000);
}

// ── Helpers ──
function getParams() {
  const sports = [...document.querySelectorAll('.sport-check input:checked')].map(c => c.value);
  return {
    sports:            sports.join(','),
    min_volume:        $('minVolume').value,
    min_shares:        $('minShares').value,
    start_price_min:   $('startPrice').value,
    current_price_max: $('curPrice').value,
  };
}

function centsStr(v) {
  if (v == null) return '\u2014';
  return (v * 100).toFixed(1) + '\u00a2';
}

function changeStr(cents) {
  if (cents == null) return '\u2014';
  const sign = cents > 0 ? '+' : '';
  return sign + cents.toFixed(1) + '\u00a2';
}

function setStatus(text, dotClass) {
  $('status').innerHTML = `<span class="dot ${dotClass}"></span> ${text}`;
}

function setLoading(on) {
  $('loadingBar').classList.toggle('hidden', !on);
}

// ── Scan ──
async function doScan() {
  if (scanning) return;
  scanning = true;
  setLoading(true);
  setStatus('Scanning\u2026', 'dot-scan');
  $('btnScan').disabled = true;

  const params = getParams();
  const qs = new URLSearchParams(params).toString();

  try {
    const resp = await fetch('/api/scan?' + qs);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();

    // Check for new swing markets (sound only fires on NEW ones)
    const allQualified = (data.results || []).filter(r => r.qualified);
    const newSwings = allQualified.filter(r => !knownSwingIds.has(r.condition_id));
    if (newSwings.length > 0) {
      playSwingAlert();
      for (const r of newSwings) knownSwingIds.add(r.condition_id);
    }

    // Telegram: send ALL qualified markets on every scan (with updated prices)
    if (allQualified.length > 0) {
      sendTelegram(allQualified);
    }

    renderResults(data);
    const elapsed = data.elapsed_s ? ` \u00b7 ${data.elapsed_s}s` : '';
    const q = data.count_qualified || 0;
    const t = data.count_total || 0;
    setStatus(
      monitoring
        ? `Live \u00b7 ${q} swings / ${t} markets${elapsed} \u00b7 next in ${$('interval').value}s`
        : `${q} swings / ${t} live markets${elapsed} \u00b7 ${new Date().toLocaleTimeString()}`,
      monitoring ? 'dot-live' : 'dot-idle'
    );
    loadLog();
  } catch (e) {
    console.error(e);
    setStatus('Error: ' + e.message, 'dot-error');
  } finally {
    scanning = false;
    setLoading(false);
    $('btnScan').disabled = false;
  }
}

// ── Render ──
function renderResults(data) {
  const area = $('resultsArea');
  const q = data.count_qualified || 0;
  const t = data.count_total || 0;
  $('resultsCount').textContent = `${q} swings / ${t} live`;

  if (!data.results || data.results.length === 0) {
    area.innerHTML = '<div class="no-results">No live matches found. Games may not be in progress right now.</div>';
    return;
  }

  const qualified = data.results.filter(r => r.qualified);
  const dimmed    = data.results.filter(r => !r.qualified);

  let html = '';

  if (qualified.length > 0) {
    html += `<div class="section-label">Swing matches (${qualified.length})</div>`;
    html += '<div class="cards">';
    for (const r of qualified) html += renderCard(r, false);
    html += '</div>';
  }

  if (dimmed.length > 0) {
    html += `<div class="section-label">Other live markets (${dimmed.length})</div>`;
    html += '<div class="cards">';
    for (const r of dimmed) html += renderCard(r, true);
    html += '</div>';
  }

  area.innerHTML = html;
}

function liveDuration(mins) {
  if (mins == null || mins < 0) return '?';
  if (mins < 60) return mins + 'm';
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return h + 'h' + (m > 0 ? ' ' + m + 'm' : '');
}

function renderCard(r, isDimmed) {
  const dimCls = isDimmed ? ' card-dimmed' : '';

  let badges = '';
  if (r.qualified) badges += '<span class="card-badge badge-swing">SWING</span> ';
  badges += '<span class="card-badge badge-live">LIVE</span>';

  // Find the pre-match favourite (highest pre_match_price)
  let favIdx = -1;
  let maxPre = -1;
  r.outcomes.forEach((o, i) => {
    if (o.pre_match_price != null && o.pre_match_price > maxPre) {
      maxPre = o.pre_match_price;
      favIdx = i;
    }
  });

  let html = `<div class="card${dimCls}">
    <div class="card-top-row">
      <span class="card-sport">${esc(r.sport)}</span>
      <span>${badges}</span>
    </div>
    <div class="card-title">
      <a href="${esc(r.polymarket_url)}" target="_blank" rel="noopener"
         title="${esc(r.market_question)}">${esc(r.market_question || r.event_title)}</a>
    </div>
    <div class="card-meta">
      ${r.live_minutes != null ? '<span>Live ' + liveDuration(r.live_minutes) + '</span>' : ''}
      <span>Vol $${fmtNum(r.volume)}</span>
    </div>`;

  if (isDimmed && r.disqualify_reason) {
    html += `<div class="card-reason">${esc(r.disqualify_reason)}</div>`;
  }

  r.outcomes.forEach((o, i) => {
    const cls = (o.change_cents != null && o.change_cents < 0) ? 'pct-neg'
              : (o.change_cents != null && o.change_cents > 0) ? 'pct-pos' : 'pct-na';
    const nameCls = (i === favIdx) ? 'outcome-name outcome-fav' : 'outcome-name';
    html += `<div class="outcome-row">
      <span class="${nameCls}" title="${esc(o.name)}">${esc(o.name)}</span>
      <span class="price price-pre">${centsStr(o.pre_match_price)}</span>
      <span class="arrow">\u2192</span>
      <span class="price">${centsStr(o.current_price)}</span>
      <span class="pct ${cls}">${changeStr(o.change_cents)}</span>
    </div>`;
  });

  html += '</div>';
  return html;
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function fmtNum(n) {
  if (n == null) return '?';
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return String(Math.round(n));
}

// ── Monitor ──
function toggleMonitor() {
  if (monitoring) stopMonitor();
  else startMonitor();
}

function startMonitor() {
  monitoring = true;
  $('btnMonitor').textContent = 'Stop Monitoring';
  $('btnMonitor').className = 'btn btn-stop';
  setStatus('Starting\u2026', 'dot-scan');
  doScan();
  scheduleNext();
}

function stopMonitor() {
  monitoring = false;
  clearTimeout(timer);
  timer = null;
  $('btnMonitor').textContent = 'Start Monitoring';
  $('btnMonitor').className = 'btn btn-start';
  setStatus('Stopped', 'dot-idle');
}

function scheduleNext() {
  if (!monitoring) return;
  const secs = Math.max(15, parseInt($('interval').value) || 60);
  timer = setTimeout(() => {
    if (!monitoring) return;
    doScan().then(() => scheduleNext());
  }, secs * 1000);
}

// ── Log ──
let logOpen = false;
function toggleLog() {
  logOpen = !logOpen;
  $('logBody').classList.toggle('hidden', !logOpen);
  $('logArrow').classList.toggle('open', logOpen);
  if (logOpen) loadLog();
}

async function loadLog() {
  try {
    const resp = await fetch('/api/log');
    const data = await resp.json();
    const entries = data.entries || [];
    $('logCount').textContent = data.total || entries.length;

    const tbody = $('logTableBody');
    tbody.innerHTML = '';
    for (const e of entries) {
      const ts = e.timestamp || e.recorded_at || '';
      const name = e.market_name || e.market_question || '';
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${esc(ts)}</td>
        <td>${esc(e.sport)}</td>
        <td>${esc(name)}</td>
        <td>${esc(e.outcome_1_name || '')}</td>
        <td>${centsStr(e.outcome_1_pre)}</td>
        <td>${centsStr(e.outcome_1_cur)}</td>
        <td>${esc(e.outcome_2_name || '')}</td>
        <td>${centsStr(e.outcome_2_pre)}</td>
        <td>${centsStr(e.outcome_2_cur)}</td>
        <td>${esc(e.outcome_3_name || '')}</td>
        <td>${centsStr(e.outcome_3_pre)}</td>
        <td>${centsStr(e.outcome_3_cur)}</td>
      `;
      tbody.appendChild(tr);
    }
  } catch (e) {
    console.error('Log fetch error:', e);
  }
}
</script>
</body>
</html>
