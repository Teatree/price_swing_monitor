<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Price Swing Monitor — Polymarket</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #09090b; --card: #18181b; --border: #27272a; --border-hi: #3f3f46;
    --text: #fafafa; --muted: #a1a1aa; --dim: #71717a;
    --accent: #f97316; --accent-dim: #c2410c;
    --green: #22c55e; --red: #ef4444; --blue: #3b82f6;
  }

  body {
    font-family: 'Space Grotesk', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    line-height: 1.5; padding: 20px; max-width: 1200px; margin: 0 auto;
  }

  h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 4px; }
  h1 span { color: var(--accent); }
  .subtitle { color: var(--muted); font-size: 0.85rem; margin-bottom: 20px; }

  /* ── Controls ── */
  .controls {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px; margin-bottom: 24px;
  }
  .controls-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 14px; margin-bottom: 16px;
  }
  .field label {
    display: block; font-size: 0.75rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px;
  }
  .field input[type="number"] {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 10px; color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size: 0.85rem;
  }
  .field input:focus { outline: none; border-color: var(--accent); }

  .sport-checks {
    display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px;
  }
  .sport-check {
    display: flex; align-items: center; gap: 6px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 12px; cursor: pointer; font-size: 0.8rem; user-select: none;
    transition: border-color 0.15s;
  }
  .sport-check:has(input:checked) { border-color: var(--accent); }
  .sport-check input { accent-color: var(--accent); cursor: pointer; }

  .controls-actions {
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  }
  .btn {
    font-family: 'Space Grotesk', sans-serif; font-weight: 600;
    padding: 10px 24px; border: none; border-radius: 8px; cursor: pointer;
    font-size: 0.9rem; transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-start { background: var(--accent); color: #fff; }
  .btn-stop  { background: var(--red); color: #fff; }
  .btn-scan  { background: var(--border-hi); color: var(--text); }

  .status {
    font-size: 0.8rem; color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .status .dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    margin-right: 4px; vertical-align: middle;
  }
  .dot-idle    { background: var(--dim); }
  .dot-live    { background: var(--green); animation: pulse 1.5s ease infinite; }
  .dot-scan    { background: var(--accent); animation: pulse 0.8s ease infinite; }
  .dot-error   { background: var(--red); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* ── Results ── */
  .results-header {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 12px;
  }
  .results-header h2 { font-size: 1.1rem; font-weight: 600; }
  .results-count { color: var(--muted); font-size: 0.8rem; font-family: 'JetBrains Mono', monospace; }

  .no-results {
    text-align: center; color: var(--dim); padding: 40px;
    border: 1px dashed var(--border); border-radius: 12px; font-size: 0.9rem;
  }

  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 14px; }

  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px; transition: border-color 0.2s;
  }
  .card:hover { border-color: var(--border-hi); }
  .card-sport {
    font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--accent); font-weight: 600; margin-bottom: 4px;
  }
  .card-title {
    font-weight: 600; font-size: 0.95rem; margin-bottom: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-title a { color: var(--text); text-decoration: none; }
  .card-title a:hover { color: var(--accent); }
  .card-meta {
    font-size: 0.75rem; color: var(--dim); margin-bottom: 12px;
    font-family: 'JetBrains Mono', monospace;
  }

  .outcome-row {
    display: grid; grid-template-columns: 1fr auto auto auto;
    align-items: center; gap: 8px; padding: 8px 0;
    border-top: 1px solid var(--border); font-size: 0.85rem;
  }
  .outcome-name { font-weight: 500; }
  .price {
    font-family: 'JetBrains Mono', monospace; font-weight: 600;
    text-align: right; font-size: 0.85rem;
  }
  .price-pre { color: var(--muted); }
  .arrow { color: var(--dim); font-size: 0.7rem; }
  .pct {
    font-family: 'JetBrains Mono', monospace; font-weight: 600;
    font-size: 0.8rem; min-width: 65px; text-align: right;
  }
  .pct-neg { color: var(--red); }
  .pct-pos { color: var(--green); }

  /* ── Log ── */
  .log-section { margin-top: 32px; }
  .log-toggle {
    display: flex; align-items: center; gap: 8px; cursor: pointer;
    font-weight: 600; font-size: 0.95rem; color: var(--muted);
    background: none; border: none; padding: 8px 0;
  }
  .log-toggle:hover { color: var(--text); }
  .log-arrow { transition: transform 0.2s; display: inline-block; }
  .log-arrow.open { transform: rotate(90deg); }

  .log-table-wrap {
    overflow-x: auto; margin-top: 10px;
    border: 1px solid var(--border); border-radius: 8px;
  }
  .log-table {
    width: 100%; border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace; font-size: 0.75rem;
  }
  .log-table th {
    text-align: left; padding: 10px 12px; background: var(--card);
    color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em;
    font-size: 0.7rem; border-bottom: 1px solid var(--border);
  }
  .log-table td {
    padding: 8px 12px; border-bottom: 1px solid var(--border);
  }
  .log-table tr:last-child td { border-bottom: none; }
  .log-table tr:hover td { background: rgba(249, 115, 22, 0.04); }

  .hidden { display: none; }

  /* ── Loading overlay ── */
  .loading-bar {
    height: 3px; background: linear-gradient(90deg, transparent, var(--accent), transparent);
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    animation: loading-slide 1.2s ease-in-out infinite;
  }
  @keyframes loading-slide {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }
</style>
</head>
<body>

<div id="loadingBar" class="loading-bar hidden"></div>

<h1>Price Swing <span>Monitor</span></h1>
<p class="subtitle">Polymarket sports markets — post-event price crashes</p>

<!-- ── Controls ── -->
<div class="controls">
  <div class="controls-grid">
    <div class="field">
      <label>Market Cap ($)</label>
      <input type="number" id="minVolume" value="10000" min="0" step="1000">
    </div>
    <div class="field">
      <label>Min Shares</label>
      <input type="number" id="minShares" value="0" min="0" step="50">
    </div>
    <div class="field">
      <label>Update Interval (s)</label>
      <input type="number" id="interval" value="60" min="15" step="5">
    </div>
    <div class="field">
      <label>Starting Price (&gt;)</label>
      <input type="number" id="startPrice" value="68" min="1" max="99" step="1">
    </div>
    <div class="field">
      <label>Current Price (&lt;)</label>
      <input type="number" id="curPrice" value="40" min="1" max="99" step="1">
    </div>
    <div class="field">
      <label>Lookback (hours)</label>
      <input type="number" id="hours" value="3" min="1" max="24" step="1">
    </div>
  </div>

  <div class="sport-checks">
    <label class="sport-check"><input type="checkbox" value="CS2" checked> CS2</label>
    <label class="sport-check"><input type="checkbox" value="Dota2" checked> Dota 2</label>
    <label class="sport-check"><input type="checkbox" value="Valorant" checked> Valorant</label>
    <label class="sport-check"><input type="checkbox" value="LoL" checked> LoL</label>
    <label class="sport-check"><input type="checkbox" value="Soccer" checked> Soccer</label>
    <label class="sport-check"><input type="checkbox" value="NFL" checked> NFL</label>
    <label class="sport-check"><input type="checkbox" value="NBA" checked> NBA</label>
    <label class="sport-check"><input type="checkbox" value="NHL" checked> NHL</label>
  </div>

  <div class="controls-actions">
    <button class="btn btn-scan" id="btnScan" onclick="doScan()">Scan Now</button>
    <button class="btn btn-start" id="btnMonitor" onclick="toggleMonitor()">Start Monitoring</button>
    <span class="status" id="status"><span class="dot dot-idle"></span> Idle</span>
  </div>
</div>

<!-- ── Results ── -->
<div class="results-header">
  <h2>Results</h2>
  <span class="results-count" id="resultsCount"></span>
</div>
<div id="resultsArea">
  <div class="no-results" id="noResults">No markets scanned yet. Click <b>Scan Now</b> or <b>Start Monitoring</b>.</div>
</div>

<!-- ── Log ── -->
<div class="log-section">
  <button class="log-toggle" onclick="toggleLog()">
    <span class="log-arrow" id="logArrow">&#9654;</span>
    Market Log (<span id="logCount">0</span> entries)
  </button>
  <div id="logBody" class="hidden">
    <div class="log-table-wrap">
      <table class="log-table">
        <thead><tr>
          <th>Timestamp</th><th>Sport</th><th>Market</th>
          <th>Out 1</th><th>Pre</th><th>Cur</th>
          <th>Out 2</th><th>Pre</th><th>Cur</th>
          <th>Out 3</th><th>Pre</th><th>Cur</th>
        </tr></thead>
        <tbody id="logTableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
// ── State ──
let monitoring = false;
let timer = null;
let scanning = false;

// ── Helpers ──
function $(id) { return document.getElementById(id); }

function getParams() {
  const sports = [...document.querySelectorAll('.sport-check input:checked')].map(c => c.value);
  return {
    sports:          sports.join(','),
    hours:           $('hours').value,
    min_volume:      $('minVolume').value,
    min_shares:      $('minShares').value,
    start_price_min: $('startPrice').value,
    current_price_max: $('curPrice').value,
  };
}

function centsStr(v) {
  if (v == null) return '—';
  return (v * 100).toFixed(1) + '¢';
}

function pctStr(v) {
  if (v == null) return '—';
  const sign = v > 0 ? '+' : '';
  return sign + v.toFixed(1) + '%';
}

function timeAgo(isoStr) {
  const diff = Date.now() - new Date(isoStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  return hrs + 'h ' + (mins % 60) + 'm ago';
}

function setStatus(text, dotClass) {
  $('status').innerHTML = `<span class="dot ${dotClass}"></span> ${text}`;
}

function setLoading(on) {
  $('loadingBar').classList.toggle('hidden', !on);
}

// ── Scan ──
async function doScan() {
  if (scanning) return;
  scanning = true;
  setLoading(true);
  setStatus('Scanning…', 'dot-scan');
  $('btnScan').disabled = true;

  const params = getParams();
  const qs = new URLSearchParams(params).toString();

  try {
    const resp = await fetch('/api/scan?' + qs);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    renderResults(data);
    const elapsed = data.elapsed_s ? ` · ${data.elapsed_s}s` : '';
    setStatus(
      monitoring
        ? `Live · ${data.count} found${elapsed} · next in ${$('interval').value}s`
        : `${data.count} found${elapsed} · ${new Date().toLocaleTimeString()}`,
      monitoring ? 'dot-live' : 'dot-idle'
    );
    // refresh log
    loadLog();
  } catch (e) {
    console.error(e);
    setStatus('Error: ' + e.message, 'dot-error');
  } finally {
    scanning = false;
    setLoading(false);
    $('btnScan').disabled = false;
  }
}

// ── Render ──
function renderResults(data) {
  const area = $('resultsArea');
  $('resultsCount').textContent = data.count + ' market' + (data.count !== 1 ? 's' : '');

  if (!data.results || data.results.length === 0) {
    area.innerHTML = '<div class="no-results">No price-swing markets found matching your filters.</div>';
    return;
  }

  let html = '<div class="cards">';
  for (const r of data.results) {
    html += `<div class="card">
      <div class="card-sport">${esc(r.sport)}</div>
      <div class="card-title">
        <a href="${esc(r.polymarket_url)}" target="_blank" rel="noopener">${esc(r.market_question || r.event_title)}</a>
      </div>
      <div class="card-meta">
        Ended ${timeAgo(r.end_date)} · Vol $${fmtNum(r.volume)}
        ${r.closed ? ' · Resolved' : ''}
      </div>`;

    for (const o of r.outcomes) {
      const pctClass = (o.pct_change != null && o.pct_change < 0) ? 'pct-neg'
                     : (o.pct_change != null && o.pct_change > 0) ? 'pct-pos' : '';
      html += `<div class="outcome-row">
        <span class="outcome-name">${esc(o.name)}</span>
        <span class="price price-pre">${centsStr(o.pre_end_price)}</span>
        <span class="arrow">→</span>
        <span class="price">${centsStr(o.current_price)}</span>
      </div>`;
    }

    // Summary row: biggest swing
    const swings = r.outcomes.filter(o => o.pct_change != null);
    if (swings.length) {
      const biggest = swings.reduce((a, b) =>
        Math.abs(a.pct_change) > Math.abs(b.pct_change) ? a : b);
      const cls = biggest.pct_change < 0 ? 'pct-neg' : 'pct-pos';
      html += `<div style="text-align:right; margin-top:8px;">
        <span class="pct ${cls}">${pctStr(biggest.pct_change)}</span>
        <span style="color:var(--dim); font-size:0.7rem; margin-left:4px;">${esc(biggest.name)}</span>
      </div>`;
    }

    html += '</div>';
  }
  html += '</div>';
  area.innerHTML = html;
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function fmtNum(n) {
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return String(Math.round(n));
}

// ── Monitor ──
function toggleMonitor() {
  if (monitoring) stopMonitor();
  else startMonitor();
}

function startMonitor() {
  monitoring = true;
  $('btnMonitor').textContent = 'Stop Monitoring';
  $('btnMonitor').className = 'btn btn-stop';
  setStatus('Starting…', 'dot-scan');
  doScan();
  scheduleNext();
}

function stopMonitor() {
  monitoring = false;
  clearTimeout(timer);
  timer = null;
  $('btnMonitor').textContent = 'Start Monitoring';
  $('btnMonitor').className = 'btn btn-start';
  setStatus('Stopped', 'dot-idle');
}

function scheduleNext() {
  if (!monitoring) return;
  const secs = Math.max(15, parseInt($('interval').value) || 60);
  timer = setTimeout(() => {
    if (!monitoring) return;
    doScan().then(() => scheduleNext());
  }, secs * 1000);
}

// ── Log ──
let logOpen = false;
function toggleLog() {
  logOpen = !logOpen;
  $('logBody').classList.toggle('hidden', !logOpen);
  $('logArrow').classList.toggle('open', logOpen);
  if (logOpen) loadLog();
}

async function loadLog() {
  try {
    const resp = await fetch('/api/log');
    const data = await resp.json();
    const entries = data.entries || [];
    $('logCount').textContent = entries.length;

    const tbody = $('logTableBody');
    tbody.innerHTML = '';
    for (const e of entries) {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${esc(e.timestamp)}</td>
        <td>${esc(e.sport)}</td>
        <td>${esc(e.market_name)}</td>
        <td>${esc(e.outcome_1_name || '')}</td>
        <td>${centsStr(e.outcome_1_pre)}</td>
        <td>${centsStr(e.outcome_1_cur)}</td>
        <td>${esc(e.outcome_2_name || '')}</td>
        <td>${centsStr(e.outcome_2_pre)}</td>
        <td>${centsStr(e.outcome_2_cur)}</td>
        <td>${esc(e.outcome_3_name || '')}</td>
        <td>${centsStr(e.outcome_3_pre)}</td>
        <td>${centsStr(e.outcome_3_cur)}</td>
      `;
      tbody.appendChild(tr);
    }
  } catch (e) {
    console.error('Log fetch error:', e);
  }
}
</script>
</body>
</html>
