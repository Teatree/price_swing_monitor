databases:
  - name: price-swing-db
    plan: free
    databaseName: price_swing
    user: swinguser

services:
  - type: web
    name: price-swing-monitor
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DATABASE_URL
        fromDatabase:
          name: price-swing-db
          property: connectionString
